{{/* Hero/Featured Image for article pages (enhanced) */}}
{{ with . }}
{{ $image := .Params.image }}
{{ if $image }}
  <figure class="hero-figure">
    <img
      src="{{ $image }}"
      alt="{{ with .Params.image_alt }}{{ . }}{{ else }}{{ .Title }}{{ end }}"
      class="hero-img"
      loading="lazy"
      decoding="async"
      {{ with .Params.image_width }}width="{{ . }}"{{ end }}
      {{ with .Params.image_height }}height="{{ . }}"{{ end }}
    >
    {{ with .Params.image_caption }}
      <figcaption class="hero-caption">{{ . }}</figcaption>
    {{ end }}
  </figure>
{{ end }}
{{ end }}
