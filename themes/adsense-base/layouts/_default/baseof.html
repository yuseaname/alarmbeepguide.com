<!DOCTYPE html>
<html lang="{{ .Lang | default "en" }}" dir="{{ if eq .Lang "ar" }}rtl{{ else }}ltr{{ end }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="min-h-screen flex flex-col {{ if eq .Site.Language.Lang "es" }}font-sans{{ else }}font-sans{{ end }}">

  <!-- Skip to content (accessibility) -->
  <a href="#main-content" class="skip-to-content">Skip to content</a>

  <!-- Reading Progress Bar (only on article pages) -->
  {{ if and (not .IsHome) (not .IsNode) }}
  <div class="progress-bar" id="reading-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
  <script>
    (function() {
      var bar = document.getElementById('reading-progress');
      if (bar) {
        var update = function() {
          var scrollTop = window.scrollY;
          var docHeight = document.documentElement.scrollHeight - window.innerHeight;
          var progress = docHeight > 0 ? Math.min(scrollTop / docHeight * 100, 100) : 0;
          bar.style.width = progress + '%';
          bar.setAttribute('aria-valuenow', Math.round(progress));
        };
        window.addEventListener('scroll', update, { passive: true });
        window.addEventListener('resize', update, { passive: true });
        update();
      }
    })();
  </script>
  {{ end }}

  <!-- Navigation -->
  {{ partial "nav.html" . }}

  <!-- Main Content -->
  <main class="flex-1" id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <!-- Footer -->
  {{ partial "footer.html" . }}

  <!-- Mobile menu toggle JS -->
  <script>
    (function() {
      var toggle = document.getElementById('nav-toggle');
      var menu = document.getElementById('mobile-menu');
      var hamburger = document.getElementById('hamburger-icon');
      var closeIcon = document.getElementById('close-icon');
      if (toggle && menu) {
        toggle.addEventListener('click', function() {
          var expanded = toggle.getAttribute('aria-expanded') === 'true' ? false : true;
          toggle.setAttribute('aria-expanded', expanded);
          menu.classList.toggle('hidden');
          if (hamburger) hamburger.classList.toggle('hidden');
          if (closeIcon) closeIcon.classList.toggle('hidden');
        });
      }
    })();
  </script>

  {{/* Minimal JS bundle */}}
  {{ with resources.Get "js/main.js" }}
    <script src="{{ .RelPermalink }}"></script>
  {{ end }}

</body>
</html>
